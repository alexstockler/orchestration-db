name: Scrape IMSLP

on:
  # Run manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      composer:
        description: 'Composer name exactly as on IMSLP (e.g. "Mozart, Wolfgang Amadeus")'
        required: true
        type: string

  # Or on a schedule — uncomment and adjust to taste
  # schedule:
  #   - cron: '0 3 * * 0'   # every Sunday at 03:00 UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # so the job can push new YAML files

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Scrape composer
        run: |
          python -m instrdb.sources.scrape_imslp \
            --composer "${{ github.event.inputs.composer }}"

      - name: Check for new files
        id: check
        run: |
          count=$(git status --porcelain data/ | wc -l | tr -d ' ')
          echo "new_files=$count" >> "$GITHUB_OUTPUT"
          echo "$count new/modified data files"

      - name: Commit and push
        if: steps.check.outputs.new_files != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "scrape: add ${{ github.event.inputs.new_files || 'new' }} works for ${{ github.event.inputs.composer }}"
          git push

      - name: No new data
        if: steps.check.outputs.new_files == '0'
        run: echo "Nothing new — all works already present or composer returned no results."
