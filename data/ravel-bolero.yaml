  notes: 'Instrumentation: piccolo, 2 flutes, 2 oboes (2nd also oboe d''amore), English
    horn, :E clarinet, 2 clarinets, bass clarinet, 2 bassoons, contrabassoon sopranino
    saxophone, soprano saxophone (also tenor saxophone), 4 horns, piccolo trumpet,
    3 trumpets, 3 trombones, tuba, timpani (3), percussion* (4 players), celesta,
    harp, strings *Further comments: # The E clarinet part can be done by one of the
    clarinets, i.e. only 3 players are needed. # Percussion: 2 snare drums, bass drum,
    cymbals, tam-tam (also celesta). Although not listed at the front of the score,
    the last 6 bars of the work show a line for Gr.C. (Grosse Caisse = bass drum.)
